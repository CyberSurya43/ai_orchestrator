# ============================================================
# AI Orchestrator — Strict Agent Configuration
# ============================================================
# Agent ownership:
#   gemini_frontend  → UI/UX, responsive layout, accessibility, client-side behavior
#   codex_engineering → architecture, backend, APIs, testing, deployment, release
#
# Every stage is executed by the same tool-using LangGraph coding agent — the
# [agents.<id>] block below only supplies its persona (system-prompt role) and,
# optionally, a preferred model `provider` ("lightning" or "nvidia", see .env).
#
# Fallback policy:
#   If the preferred (or active) provider errors out, the orchestrator retries
#   the stage with the next configured provider, so work never stalls.
#
# Shared context:
#   .orchestrator/context.json is read and written across every stage/session.
#   Every task file has the shared context block appended automatically.
# ============================================================

[project]
name = "new-web-application"
workspace = "workspace"

[stack]
frontend = "To be selected by the agent from the app brief unless already specified"
backend  = "To be selected by the agent from the app brief unless already specified"
database = "To be selected by the agent when persistence is required"
deployment = "Docker-first deployment handoff unless the brief specifies a platform"

# ============================================================
# Agents
# ============================================================

[agents.gemini_frontend]
name     = "Frontend Engineer"
provider = "nvidia"
role     = """\
STRICT FRONTEND AGENT RULES
============================
You are the Frontend Engineer, the exclusive owner of all frontend work.

RESPONSIBILITIES (you MUST do these):
- Build the complete UI/UX from the brief and architecture docs.
- Produce responsive layouts that work on mobile, tablet, and desktop.
- Implement all client-side state, routing, and form validation.
- Ensure WCAG 2.1 AA accessibility on every component.
- Create realistic loading, empty, error, and success states.
- Generate API client stubs or mock data where backend is unavailable.
- Write clear inline comments explaining non-obvious UI decisions.

STRICT BOUNDARIES (you MUST NOT do these):
- Do not modify backend source, database schemas, or migrations.
- Do not change test infrastructure, CI/CD configs, or Dockerfiles.
- Do not make deployment or release decisions.
- Do not override the Engineering Lead's API contract — if the contract is wrong, flag it in your notes.

HANDOFF:
- Write a completion note to .orchestrator/notes/<stage>.md listing:
  every file created or modified, the component tree, open integration questions.
- Keep frontend/backend boundary comments inside the code at integration points.
"""

[agents.codex_engineering]
name     = "Engineering Lead"
provider = "lightning"
role     = """\
STRICT ENGINEERING AGENT RULES
================================
You are the Engineering Lead, the exclusive owner of architecture, backend, testing, deployment, and release.

RESPONSIBILITIES (you MUST do these):
- Translate the brief into a concrete architecture, API contract, and data model.
- Build all backend services, REST/GraphQL endpoints, auth, and persistence.
- Write automated tests: unit, integration, and critical user-flow e2e.
- Integrate the frontend output with the backend without altering the Frontend Engineer's UI intent.
- Produce Dockerfiles, compose files, env docs, and release checklists.
- Document every local startup command precisely.
- Validate that all acceptance criteria are met before marking a stage done.

STRICT BOUNDARIES (you MUST NOT do these):
- Do not redesign or restyle UI components owned by the Frontend Engineer.
- Do not bypass the Frontend Engineer's frontend integration points — wire them, don't replace them.
- Do not commit secrets, credentials, or hardcoded environment values.

HANDOFF:
- Write a completion note to .orchestrator/notes/<stage>.md listing:
  every file created or modified, commands run, test results, and known gaps.
- Update workspace/docs/ with any API or architecture changes made during this stage.
"""

# ============================================================
# Stages
# ============================================================

[[stages]]
name       = "00_intake_architecture"
agent      = "codex_engineering"
title      = "Intake and Architecture"
objective  = """\
Convert the app brief into a concrete implementation plan. Produce:
- A repository structure diagram.
- A detailed API contract (routes, request/response shapes, error codes).
- A data model with entity relationships.
- An explicit frontend/backend responsibility boundary.
- A risk list with reasonable defaults for open questions.
"""
inputs     = ["brief.md", "Any files already present in workspace/"]
outputs    = [
  "workspace/docs/architecture.md",
  "workspace/docs/api-contract.md",
  "workspace/docs/build-plan.md",
]
acceptance = [
  "Frontend and backend responsibilities are explicitly named.",
  "Every API endpoint has a route, method, request shape, response shape, and error codes.",
  "Data model covers all entities from the brief with field types and constraints.",
  "Open questions are listed with a chosen default so no stage is blocked.",
]

[[stages]]
name       = "10_frontend_gemini"
agent      = "gemini_frontend"
title      = "Frontend Application"
objective  = """\
Build the complete frontend experience. The UI must be polished, responsive, and accessible.
Read architecture.md and api-contract.md before writing any code.
Use mock data or API stubs for endpoints not yet available.
"""
inputs     = [
  "brief.md",
  "workspace/docs/architecture.md",
  "workspace/docs/api-contract.md",
]
outputs    = [
  "Frontend source code under workspace/",
  "workspace/docs/frontend-notes.md (component tree, integration points, open questions)",
]
acceptance = [
  "UI is responsive across mobile (375 px), tablet (768 px), and desktop (1280 px).",
  "All interactive elements have keyboard access and ARIA labels.",
  "Loading, empty, error, and success states are implemented for every data-driven view.",
  "API calls use only routes and payloads from api-contract.md.",
  "No hardcoded backend URLs — use environment variables or a config module.",
]

[[stages]]
name       = "20_backend_codex"
agent      = "codex_engineering"
title      = "Backend Services"
objective  = """\
Build all backend services and API endpoints that satisfy api-contract.md.
Implement authentication/authorization if the brief requires it.
Set up the database schema and migrations.
All sensitive config must use environment variables — no hardcoded secrets.
"""
inputs     = [
  "brief.md",
  "workspace/docs/architecture.md",
  "workspace/docs/api-contract.md",
  "workspace/docs/frontend-notes.md",
]
outputs    = [
  "Backend source code under workspace/",
  "Database migration files or schema docs under workspace/",
  "workspace/docs/backend-notes.md (startup instructions, env vars required)",
]
acceptance = [
  "Every endpoint in api-contract.md is implemented and returns the specified shapes.",
  "Input validation and structured error responses are present on all endpoints.",
  "Auth middleware (if required) is applied consistently.",
  "All secrets and config values come from environment variables.",
  "Local startup is documented with exact commands.",
]

[[stages]]
name       = "30_integration_codex"
agent      = "codex_engineering"
title      = "Full-Stack Integration"
objective  = """\
Connect the frontend and backend into one runnable application.
Resolve any API contract drift discovered during frontend or backend work.
Verify that all frontend integration stubs are replaced with real calls.
"""
inputs     = [
  "Frontend source code",
  "Backend source code",
  "workspace/docs/api-contract.md",
  "workspace/docs/frontend-notes.md",
  "workspace/docs/backend-notes.md",
]
outputs    = [
  "Integrated application under workspace/",
  "workspace/docs/integration-notes.md (changes made, drift resolved, startup command)",
]
acceptance = [
  "A single documented command path starts the full application locally.",
  "Frontend and backend agree on all routes, payload shapes, and error formats.",
  "No mock data or API stubs remain active in the production code path.",
  "Any deviations from the original API contract are documented.",
]

[[stages]]
name       = "40_testing_codex"
agent      = "codex_engineering"
title      = "Testing and Quality"
objective  = """\
Add automated tests covering backend logic, API endpoints, and critical frontend flows.
Run all tests and record results.
Fix any failures found during this stage.
"""
inputs     = [
  "Integrated application source",
  "workspace/docs/build-plan.md",
  "workspace/docs/api-contract.md",
]
outputs    = [
  "Test source files under workspace/",
  "workspace/docs/test-report.md (commands run, pass/fail counts, coverage, known gaps)",
]
acceptance = [
  "All critical backend endpoints have at least one happy-path and one error-path test.",
  "Critical frontend user flows have integration or e2e coverage.",
  "Test commands and results are recorded in test-report.md.",
  "No known test failures are left undocumented.",
]

[[stages]]
name       = "50_deployment_codex"
agent      = "codex_engineering"
title      = "Deployment Package"
objective  = """\
Prepare the application for production deployment.
Produce container configuration, environment documentation, and a release checklist.
"""
inputs     = [
  "Integrated and tested application source",
  "workspace/docs/test-report.md",
  "workspace/docs/backend-notes.md",
]
outputs    = [
  "Dockerfile and docker-compose.yml (or platform-equivalent config) under workspace/",
  "workspace/docs/deployment.md (build steps, env vars, health checks, rollback notes)",
  "workspace/docs/release-checklist.md",
]
acceptance = [
  "Production build path is documented end-to-end.",
  "All required environment variables are listed with descriptions.",
  "Health checks or smoke-test commands are defined.",
  "Rollback or recovery procedure is documented.",
  "No development-only secrets, debug flags, or mock paths exist in the production config.",
]
